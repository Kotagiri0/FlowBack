name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Проверка размера PR
  pr-size:
    name: Check PR Size
    runs-on: ubuntu-latest

    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const total = additions + deletions;
            
            console.log(`Total changes: ${total}`);
            
            if (total > 1000) {
              core.warning('This PR is very large. Consider splitting it into smaller PRs.');
            }

  # Проверка описания PR
  pr-description:
    name: Check PR Description
    runs-on: ubuntu-latest

    steps:
      - name: Check description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            if (body.length < 20) {
              core.setFailed('PR description is too short. Please provide more details.');
            }

  # Быстрые тесты для PR
  quick-tests:
    name: Quick Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run quick tests
        run: npm test -- --maxWorkers=2

  # Проверка конфликтов
  check-conflicts:
    name: Check for Conflicts
    runs-on: ubuntu-latest

    steps:
      - name: Check for merge conflicts
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.mergeable === false) {
              core.setFailed('This PR has merge conflicts. Please resolve them.');
            }

  # Автоматический ревью
  auto-review:
    name: Auto Review
    runs-on: ubuntu-latest
    needs: [quick-tests]

    steps:
      - name: Auto approve for dependabot
        if: github.actor == 'dependabot[bot]'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: 'Auto-approved by CI/CD'
            });